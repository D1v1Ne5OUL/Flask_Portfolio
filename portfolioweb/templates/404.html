<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Страница не найдена</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }
        .container { padding: 40px; }
        .code { font-size: 120px; font-weight: bold; margin-bottom: 20px; }
        .title { font-size: 28px; margin-bottom: 20px; }
        .message { font-size: 16px; opacity: 0.9; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <div class="title">🔍 Страница не найдена</div>
        <div class="message">Страница, которую вы ищете, не существует или была перемещена.</div>
        <a href="{{ url_for('index') }}" class="btn">На главную</a>
    </div>
</body>
</html>
